<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FFD700">
    <meta name="description" content="实时工资计算器，让打工更有动力">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>打工搞钱神器 - 实时工资计算器</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #FFD700;
            --gold-dark: #B8860B;
            --green: #00C853;
            --green-dark: #00897B;
            --bg-dark: #0a0a0a;
            --bg-card: rgba(30, 30, 30, 0.95);
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* 背景动画 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at center, rgba(255, 215, 0, 0.1) 0%, transparent 50%);
            animation: bgPulse 8s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        /* 头部 */
        .header {
            text-align: center;
            padding: 30px 0;
        }

        .logo {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold) 0%, #FFA500 50%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            margin-bottom: 8px;
        }

        .slogan {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* 输入面板 */
        .input-panel {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .calc-info {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: rgba(0, 200, 83, 0.1);
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .calc-item {
            text-align: center;
        }

        .calc-item .value {
            font-size: 1rem;
            font-weight: 700;
            color: var(--green);
        }

        .calc-item .label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .btn {
            width: 100%;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-start {
            background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(0, 200, 83, 0.4);
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 200, 83, 0.5);
        }

        .btn-stop {
            background: linear-gradient(135deg, #FF6B6B 0%, #EE5A5A 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }

        .btn-stop:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 107, 107, 0.5);
        }

        /* 实时收入展示 */
        .earning-display {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .earning-display::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--green), var(--gold));
            animation: shimmer 2s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .earning-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .earning-amount {
            font-family: 'Orbitron', monospace;
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            margin-bottom: 5px;
            transition: transform 0.1s;
        }

        .earning-amount.pulse {
            animation: numberPulse 0.15s ease-out;
        }

        @keyframes numberPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .earning-currency {
            font-size: 1.5rem;
            color: var(--gold-dark);
        }

        .earning-stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-item {
            text-align: center;
        }

        .stat-item .value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--green);
        }

        .stat-item .label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* 进度条 */
        .progress-section {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .progress-title {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .progress-next {
            font-size: 0.85rem;
            color: var(--gold);
        }

        .progress-bar {
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--green) 0%, var(--gold) 100%);
            border-radius: 6px;
            transition: width 0.3s ease-out;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%);
            animation: progressShine 2s infinite;
        }

        @keyframes progressShine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* 成果时间线 */
        .achievements {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .achievements-title {
            font-size: 1rem;
            color: var(--text-primary);
            margin-bottom: 15px;
            text-align: center;
        }

        .achievement-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .achievement-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            transition: all 0.3s;
        }

        .achievement-item.unlocked {
            background: rgba(0, 200, 83, 0.15);
            border: 1px solid rgba(0, 200, 83, 0.3);
        }

        .achievement-item.unlocked .achievement-icon {
            animation: bounce 0.5s ease-out;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .achievement-icon {
            font-size: 1.5rem;
            margin-right: 12px;
            filter: grayscale(100%);
            opacity: 0.5;
        }

        .achievement-item.unlocked .achievement-icon {
            filter: grayscale(0%);
            opacity: 1;
        }

        .achievement-info {
            flex: 1;
        }

        .achievement-name {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .achievement-item.unlocked .achievement-name {
            color: var(--text-primary);
        }

        .achievement-amount {
            font-size: 0.8rem;
            color: var(--gold);
            font-weight: 700;
        }

        /* 金币动画容器 */
        .coin-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            overflow: hidden;
        }

        .coin {
            position: absolute;
            font-size: 2rem;
            animation: coinFall 3s linear forwards;
        }

        @keyframes coinFall {
            0% {
                transform: translateY(-50px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* 庆祝弹窗 */
        .celebration-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
        }

        .celebration-modal.show {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .celebration-content {
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            border: 2px solid var(--gold);
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .celebration-icon {
            font-size: 5rem;
            margin-bottom: 15px;
            animation: celebrate 0.5s ease-in-out infinite alternate;
        }

        @keyframes celebrate {
            from { transform: scale(1) rotate(-5deg); }
            to { transform: scale(1.1) rotate(5deg); }
        }

        .celebration-text {
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .celebration-amount {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .celebration-close {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: #000;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .celebration-close:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        /* 滚动条样式 */
        .achievement-list::-webkit-scrollbar {
            width: 6px;
        }

        .achievement-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .achievement-list::-webkit-scrollbar-thumb {
            background: rgba(255, 215, 0, 0.3);
            border-radius: 3px;
        }

        /* 隐藏状态 */
        .hidden {
            display: none !important;
        }

        /* 响应式 */
        @media (max-width: 400px) {
            .logo {
                font-size: 1.6rem;
            }
            .earning-amount {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="coin-container" id="coinContainer"></div>

    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1 class="logo">💰 打工搞钱神器</h1>
            <p class="slogan">每一秒都在赚钱的快乐 ✨</p>
        </header>

        <!-- 输入面板 -->
        <div class="input-panel" id="inputPanel">
            <div class="input-group">
                <label>💵 月薪（元）</label>
                <input type="number" id="salaryInput" placeholder="输入你的月薪" min="0" step="100">
            </div>
            <div class="input-group">
                <label>⏰ 每日工作时长（小时）</label>
                <input type="number" id="hoursInput" placeholder="默认8小时" min="1" max="24" value="8">
            </div>
            <div class="calc-info">
                <div class="calc-item">
                    <div class="value" id="perSecond">¥0.000</div>
                    <div class="label">每秒</div>
                </div>
                <div class="calc-item">
                    <div class="value" id="perMinute">¥0.00</div>
                    <div class="label">每分钟</div>
                </div>
                <div class="calc-item">
                    <div class="value" id="perHour">¥0.00</div>
                    <div class="label">每小时</div>
                </div>
            </div>
            <button class="btn btn-start" id="startBtn">🚀 开始搞钱</button>
        </div>

        <!-- 实时收入展示 -->
        <div class="earning-display hidden" id="earningDisplay">
            <div class="earning-label">今日已赚</div>
            <div class="earning-amount">
                <span id="currentEarning">0.00</span>
                <span class="earning-currency">元</span>
            </div>
            <div class="earning-stats">
                <div class="stat-item">
                    <div class="value" id="runTime">00:00:00</div>
                    <div class="label">已工作</div>
                </div>
                <div class="stat-item">
                    <div class="value" id="todayPerHour">¥0.00</div>
                    <div class="label">时薪</div>
                </div>
                <div class="stat-item">
                    <div class="value" id="todayPerSecond">¥0.000</div>
                    <div class="label">秒赚</div>
                </div>
            </div>
            <button class="btn btn-stop" id="stopBtn" style="margin-top: 20px;">⏹️ 结束今日搞钱</button>
        </div>

        <!-- 进度条 -->
        <div class="progress-section hidden" id="progressSection">
            <div class="progress-header">
                <span class="progress-title">下一个目标</span>
                <span class="progress-next" id="nextAchievement">🧋 蜜雪冰城</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>

        <!-- 成果时间线 -->
        <div class="achievements" id="achievementsSection">
            <h3 class="achievements-title">🏆 阶段性成果</h3>
            <div class="achievement-list" id="achievementList"></div>
        </div>
    </div>

    <!-- 庆祝弹窗 -->
    <div class="celebration-modal" id="celebrationModal">
        <div class="celebration-content">
            <div class="celebration-icon" id="celebrationIcon">🧋</div>
            <div class="celebration-text" id="celebrationText">一杯蜜雪冰城到账</div>
            <div class="celebration-amount" id="celebrationAmount">¥5</div>
            <button class="celebration-close" id="celebrationClose">太棒了！继续搞钱 💪</button>
        </div>
    </div>

    <script>
        // 成果配置
        const achievements = [
            { amount: 5, icon: '🧋', name: '一杯蜜雪冰城到账' },
            { amount: 15, icon: '🍜', name: '一碗热干面到账' },
            { amount: 25, icon: '🧋', name: '一杯喜茶到账' },
            { amount: 35, icon: '🍔', name: '一份麦当劳套餐到账' },
            { amount: 50, icon: '🎬', name: '一张电影票到账' },
            { amount: 100, icon: '⛽', name: '一箱油的零头到账' },
            { amount: 150, icon: '🎧', name: '一副耳机到账' },
            { amount: 200, icon: '👟', name: '一双鞋子的首付到账' },
            { amount: 300, icon: '💄', name: '一支大牌口红到账' },
            { amount: 500, icon: '📱', name: '手机碎屏险到账' },
            { amount: 800, icon: '🛒', name: '超市大采购到账' },
            { amount: 1000, icon: '💰', name: '四位数俱乐部到账' }
        ];

        // 状态变量
        let isRunning = false;
        let interval = null;
        let currentEarning = 0;
        let perSecondRate = 0;
        let unlockedAchievements = new Set();
        let startTime = null;

        // DOM 元素
        const salaryInput = document.getElementById('salaryInput');
        const hoursInput = document.getElementById('hoursInput');
        const perSecondEl = document.getElementById('perSecond');
        const perMinuteEl = document.getElementById('perMinute');
        const perHourEl = document.getElementById('perHour');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const inputPanel = document.getElementById('inputPanel');
        const earningDisplay = document.getElementById('earningDisplay');
        const progressSection = document.getElementById('progressSection');
        const currentEarningEl = document.getElementById('currentEarning');
        const runTimeEl = document.getElementById('runTime');
        const todayPerHourEl = document.getElementById('todayPerHour');
        const todayPerSecondEl = document.getElementById('todayPerSecond');
        const progressFill = document.getElementById('progressFill');
        const nextAchievementEl = document.getElementById('nextAchievement');
        const achievementList = document.getElementById('achievementList');
        const celebrationModal = document.getElementById('celebrationModal');
        const celebrationIcon = document.getElementById('celebrationIcon');
        const celebrationText = document.getElementById('celebrationText');
        const celebrationAmount = document.getElementById('celebrationAmount');
        const celebrationClose = document.getElementById('celebrationClose');
        const coinContainer = document.getElementById('coinContainer');

        // 音频上下文
        let audioContext = null;

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 播放"叮"音效
        function playDing() {
            initAudio();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(880, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(1760, audioContext.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        // 计算收入率
        function calculateRates() {
            const salary = parseFloat(salaryInput.value) || 0;
            const hoursPerDay = parseFloat(hoursInput.value) || 8;
            
            // 假设每月工作22天
            const workDaysPerMonth = 22;
            const workSecondsPerMonth = workDaysPerMonth * hoursPerDay * 3600;
            
            perSecondRate = salary / workSecondsPerMonth;
            const perMinute = perSecondRate * 60;
            const perHour = perSecondRate * 3600;
            
            perSecondEl.textContent = `¥${perSecondRate.toFixed(4)}`;
            perMinuteEl.textContent = `¥${perMinute.toFixed(2)}`;
            perHourEl.textContent = `¥${perHour.toFixed(2)}`;
        }

        // 初始化成果列表
        function initAchievements() {
            achievementList.innerHTML = achievements.map((a, i) => `
                <div class="achievement-item" data-index="${i}">
                    <span class="achievement-icon">${a.icon}</span>
                    <div class="achievement-info">
                        <div class="achievement-name">${a.name}</div>
                        <div class="achievement-amount">¥${a.amount}</div>
                    </div>
                </div>
            `).join('');
        }

        // 检查成果解锁
        function checkAchievements() {
            for (let i = 0; i < achievements.length; i++) {
                const achievement = achievements[i];
                if (currentEarning >= achievement.amount && !unlockedAchievements.has(i)) {
                    unlockedAchievements.add(i);
                    showCelebration(achievement);
                    updateAchievementUI(i);
                    break;
                }
            }
        }

        // 更新成果UI
        function updateAchievementUI(index) {
            const items = achievementList.querySelectorAll('.achievement-item');
            items[index].classList.add('unlocked');
        }

        // 更新进度条
        function updateProgress() {
            let nextIndex = -1;
            for (let i = 0; i < achievements.length; i++) {
                if (!unlockedAchievements.has(i)) {
                    nextIndex = i;
                    break;
                }
            }

            if (nextIndex === -1) {
                nextAchievementEl.textContent = '🎉 全部解锁！';
                progressFill.style.width = '100%';
                return;
            }

            const next = achievements[nextIndex];
            const prev = nextIndex > 0 ? achievements[nextIndex - 1].amount : 0;
            const progress = ((currentEarning - prev) / (next.amount - prev)) * 100;
            
            nextAchievementEl.textContent = `${next.icon} ${next.name.replace('到账', '')}`;
            progressFill.style.width = `${Math.min(progress, 100)}%`;
        }

        // 显示庆祝弹窗
        function showCelebration(achievement) {
            celebrationIcon.textContent = achievement.icon;
            celebrationText.textContent = achievement.name;
            celebrationAmount.textContent = `¥${achievement.amount}`;
            celebrationModal.classList.add('show');
            playDing();
            createCoinRain();
        }

        // 创建金币雨
        function createCoinRain() {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const coin = document.createElement('div');
                    coin.className = 'coin';
                    coin.textContent = '🪙';
                    coin.style.left = Math.random() * 100 + 'vw';
                    coin.style.animationDuration = (2 + Math.random() * 2) + 's';
                    coinContainer.appendChild(coin);
                    
                    setTimeout(() => coin.remove(), 4000);
                }, i * 100);
            }
        }

        // 格式化时间
        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // 开始计时
        function startEarning() {
            if (!salaryInput.value || parseFloat(salaryInput.value) <= 0) {
                salaryInput.focus();
                salaryInput.style.borderColor = '#FF6B6B';
                setTimeout(() => salaryInput.style.borderColor = '', 1000);
                return;
            }

            initAudio();
            isRunning = true;
            startTime = Date.now();
            currentEarning = 0;
            unlockedAchievements.clear();
            
            // 重置成果UI
            const items = achievementList.querySelectorAll('.achievement-item');
            items.forEach(item => item.classList.remove('unlocked'));

            calculateRates();

            inputPanel.classList.add('hidden');
            earningDisplay.classList.remove('hidden');
            progressSection.classList.remove('hidden');

            let seconds = 0;
            interval = setInterval(() => {
                seconds++;
                currentEarning += perSecondRate;
                
                // 更新显示
                currentEarningEl.textContent = currentEarning.toFixed(2);
                runTimeEl.textContent = formatTime(seconds);
                todayPerHourEl.textContent = `¥${(perSecondRate * 3600).toFixed(2)}`;
                todayPerSecondEl.textContent = `¥${perSecondRate.toFixed(4)}`;

                // 脉冲动画
                currentEarningEl.parentElement.classList.add('pulse');
                setTimeout(() => currentEarningEl.parentElement.classList.remove('pulse'), 150);

                // 检查成果
                checkAchievements();
                updateProgress();
            }, 1000);
        }

        // 停止计时
        function stopEarning() {
            isRunning = false;
            if (interval) {
                clearInterval(interval);
                interval = null;
            }

            inputPanel.classList.remove('hidden');
            earningDisplay.classList.add('hidden');
            progressSection.classList.add('hidden');
        }

        // 事件监听
        salaryInput.addEventListener('input', calculateRates);
        hoursInput.addEventListener('input', calculateRates);
        startBtn.addEventListener('click', startEarning);
        stopBtn.addEventListener('click', stopEarning);
        celebrationClose.addEventListener('click', () => {
            celebrationModal.classList.remove('show');
        });

        // 初始化
        initAchievements();
        calculateRates();
    </script>
</body>
</html>
